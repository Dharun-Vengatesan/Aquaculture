<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generic IoT Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Generic IoT Dashboard</h1>
        <p>Reusable for ESP8266, ESP32, Arduino, or any HTTP/WebSocket device.</p>
      </header>

      <section class="panel">
        <div class="row">
          <h2>Connection Status</h2>
          <span id="statusBadge" class="status disconnected">Disconnected</span>
        </div>
        <p id="lastUpdated" class="muted">No data received yet.</p>
      </section>

      <section class="panel">
        <div class="row">
          <h2>Device Control</h2>
          <label class="toggle">
            <input id="controlToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>
        <p id="controlMessage" class="muted">Command: OFF</p>
      </section>

      <section class="panel">
        <h2>Live Sensor Data</h2>
        <p class="muted">Auto-refresh every 5 seconds.</p>
        <div id="sensorGrid" class="grid"></div>
      </section>

      <p id="errorMessage" class="error hidden"></p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
